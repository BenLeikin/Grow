<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seedling Light</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <h1><span class="sprout">&#127793;</span> Seedling Light</h1>
  <div class="hright">
    <span id="authbox" style="display:none">
      <span id="rolabel" class="robadge" style="display:none">read-only</span>
      <input type="password" id="pw" placeholder="password" autocomplete="current-password">
      <button type="button" id="loginbtn">Log in</button>
      <button type="button" id="logoutbtn" style="display:none">Log out</button>
      <span id="loginerr"></span>
    </span>
    <div id="clock">--:--:--</div>
  </div>
</header>
<div class="vine" aria-hidden="true"></div>

<main class="glayout">

<div class="aleft">

<div class="card phase aphase">
  <div class="sun" id="bulb" aria-hidden="true">
    <svg viewBox="0 0 100 100" class="sunsvg">
      <g class="raygroup"><path d="M61.0 32.0 Q50.0 3.0 50.0 3.0 L39.0 32.0 Z"/><path d="M68.5 39.9 Q73.5 9.3 73.5 9.3 L49.5 28.9 Z"/><path d="M71.1 50.5 Q90.7 26.5 90.7 26.5 L60.1 31.5 Z"/><path d="M68.0 61.0 Q97.0 50.0 97.0 50.0 L68.0 39.0 Z"/><path d="M60.1 68.5 Q90.7 73.5 90.7 73.5 L71.1 49.5 Z"/><path d="M49.5 71.1 Q73.5 90.7 73.5 90.7 L68.5 60.1 Z"/><path d="M39.0 68.0 Q50.0 97.0 50.0 97.0 L61.0 68.0 Z"/><path d="M31.5 60.1 Q26.5 90.7 26.5 90.7 L50.5 71.1 Z"/><path d="M28.9 49.5 Q9.3 73.5 9.3 73.5 L39.9 68.5 Z"/><path d="M32.0 39.0 Q3.0 50.0 3.0 50.0 L32.0 61.0 Z"/><path d="M39.9 31.5 Q9.3 26.5 9.3 26.5 L28.9 50.5 Z"/><path d="M50.5 28.9 Q26.5 9.3 26.5 9.3 L31.5 39.9 Z"/></g>
      <circle class="sundisk" cx="50" cy="50" r="23"/>
      <g class="face">
        <circle cx="43" cy="48" r="3"/>
        <circle cx="57" cy="48" r="3"/>
        <path d="M44 55 Q50 61 56 55" fill="none" stroke-width="2.6" stroke-linecap="round"/>
      </g>
    </svg>
  </div>
  <div>
    <b id="phase">Loading</b>
    <span id="next">&nbsp;</span>
  </div>
  <div class="pct"><b id="pct">--%</b><br><span style="font-size:12px;color:var(--leaf)">brightness</span></div>
</div>

<div class="card achart">
  <svg id="chart" viewBox="0 0 640 240" role="img" aria-label="Today's light curve"></svg>
</div>

<div class="card afacts">
  <dl class="grid" id="facts"></dl>
</div>

</div>

<div class="amedia">

<div class="card asnap" id="photocard" style="display:none">
  <h2>&#128247; Latest snapshot</h2>
  <div class="imgwrap">
    <img id="photo" alt="Latest seedling photo">
    <svg id="gridsvg" viewBox="0 0 1000 1000" preserveAspectRatio="none" style="display:none"></svg>
  </div>
  <div id="photoinfo"></div>
  <div class="gridctl editonly">
    <label><input type="checkbox" id="gridshow"> Show cell grid</label>
    <button type="button" id="detectbtn">&#128269; Detect</button>
    <span>Rows <input type="number" id="gridrows" min="1" max="12"></span>
    <span>Cols <input type="number" id="gridcols" min="1" max="12"></span>
    <span id="gridinfo"></span>
  </div>
</div>

<div class="card avideo" id="videocard" style="display:none">
  <h2>&#127916; Timelapse</h2>
  <img id="vframe" alt="Timelapse frame">
  <div class="pctrl">
    <button type="button" id="playbtn">&#9654; Grow</button>
    <input type="range" id="scrub" min="0" max="0" value="0" step="1"
           aria-label="Timelapse position">
    <span id="pframe"></span>
  </div>
  <div class="pctrl">
    <button type="button" id="renderbtn" class="editonly">&#127909; Render video</button>
    <span id="renderinfo" style="font-size:13px;color:var(--leaf)"></span>
    <a id="dlbtn" href="/video" download
       style="display:none;margin-left:auto;font-size:14px;font-weight:600;
       color:var(--leaf)">&#11015; Download MP4</a>
  </div>
</div>

</div>

<div class="card asensors" id="sensorcard" style="display:none">
  <h2>&#128202; Sensors</h2>
  <div id="stubbanner" class="banner" style="display:none">
    Demo data &mdash; no sensors wired yet. These values are simulated.
  </div>
  <div class="sreadout" id="sreadout"></div>
  <div class="waterctl editonly" id="waterctl" style="display:none">
    <span class="schip">Float <b id="floatstate">--</b></span>
    <span class="schip">Pump today <b id="pumptoday">0</b><span class="u">s</span></span>
    <button type="button" id="pumpbtn">Test pump</button>
    <input type="number" id="pumpsecs" value="3" min="1" max="20" aria-label="Pump seconds">
    <span class="u">s</span>
    <span id="pumpinfo"></span>
  </div>
  <div class="chartctl">
    <select id="chartsensor" aria-label="Sensor to chart"></select>
    <span class="ranges" id="ranges">
      <button type="button" data-h="24">24h</button>
      <button type="button" data-h="168" class="on">7d</button>
      <button type="button" data-h="720">30d</button>
    </span>
    <span id="chartinfo"></span>
  </div>
  <svg id="histchart" viewBox="0 0 720 240" preserveAspectRatio="none"
       role="img" aria-label="Sensor history"></svg>
</div>

<details class="card aset editonly">
  <summary><h2>&#127807; Settings</h2></summary>
  <form id="cfgform">
    <div class="frow">
      <div><label>Latitude <input name="latitude" type="number" step="0.0001" min="-90" max="90" required></label></div>
      <div><label>Longitude <input name="longitude" type="number" step="0.0001" min="-180" max="180" required></label></div>
      <div class="tzrow"><label>Timezone <select name="timezone" required>
        {% for z in tzs %}<option value="{{ z }}">{{ z }}</option>{% endfor %}
      </select></label></div>
      <div><label>Max brightness (%) <input name="max_bright" type="number" min="1" max="100" required></label></div>
      <div><label>Ramp length (min) <input name="ramp_min" type="number" min="0" max="240" required></label></div>
      <div><label>Sunrise offset (min) <input name="sunrise_offset_min" type="number" min="-360" max="360" required></label></div>
      <div><label>Sunset offset (min) <input name="sunset_offset_min" type="number" min="-360" max="360" required></label></div>
      <div class="checkrow"><input type="checkbox" name="capture_enabled" id="capen">
        <label for="capen" style="font-size:14px;color:var(--fir)">Timelapse camera</label></div>
      <div></div>
      <div><label>Photo interval (min) <input name="capture_interval_min" type="number" min="5" max="720" required></label></div>
      <div><label>Photo brightness (%) <input name="capture_brightness" type="number" min="1" max="100" required></label></div>
      <div class="tzrow"><label>Photo crop x,y,w,h (fractions, blank = full frame)
        <input name="roi" type="text" placeholder="0.22,0.08,0.57,0.82"></label></div>
    </div>
    <button type="submit">Save &amp; replant</button><span id="msg"></span>
  </form>
</details>

</main>

<footer id="cfg"></footer>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
